services:
  # ─── Bitcoin Core (regtest) ─────────────────────────────────
  bitcoind:
    image: ${BITCOIN_IMAGE:-lncm/bitcoind:v28.0}
    container_name: bitcoind
    restart: unless-stopped
    command:
      - -regtest
      - -server=1
      - -txindex=1
      - -printtoconsole=1
      - -rpcuser=${BITCOIN_RPC_USER:-bitcoin}
      - -rpcpassword=${BITCOIN_RPC_PASS:-bitcoin}
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcport=18443
      - -zmqpubrawblock=tcp://0.0.0.0:28332
      - -zmqpubrawtx=tcp://0.0.0.0:28333
      - -fallbackfee=0.00001
    volumes:
      - bitcoin_data:/data/.bitcoin
    ports:
      - "${PORT_BTC_RPC:-18443}:18443"
      - "${PORT_BTC_P2P:-18444}:18444"
      - "${PORT_BTC_ZMQ_BLOCK:-28332}:28332"
      - "${PORT_BTC_ZMQ_TX:-28333}:28333"
    networks:
      - fedimint-net
    healthcheck:
      test: >
        bitcoin-cli -regtest
        -rpcuser=${BITCOIN_RPC_USER:-bitcoin}
        -rpcpassword=${BITCOIN_RPC_PASS:-bitcoin}
        getblockchaininfo
      interval: 5s
      timeout: 3s
      retries: 30

  # ─── LND (Lightning Network Daemon) ────────────────────────
  lnd:
    image: ${LND_IMAGE:-lightninglabs/lnd:daily-testing-only}
    container_name: lnd
    restart: unless-stopped
    volumes:
      - lnd_data:/root/.lnd
      - ./config/lnd/lnd.conf:/root/.lnd/lnd.conf:ro
    ports:
      - "${PORT_LND_GRPC:-10009}:10009"
      - "${PORT_LND_REST:-8080}:8080"
      - "${PORT_LND_P2P:-9735}:9735"
    depends_on:
      bitcoind:
        condition: service_healthy
    networks:
      - fedimint-net

  # ─── Fedimint Guardian ──────────────────────────────────────
  fedimintd:
    image: ${FEDIMINT_IMAGE:-fedimint/fedimintd:releases-v0.10.0}
    container_name: fedimintd
    restart: unless-stopped
    environment:
      FM_BIND_P2P: "0.0.0.0:8173"
      FM_BIND_API: "0.0.0.0:8174"
      FM_BIND_UI: "0.0.0.0:8175"
      FM_P2P_URL: "fedimint://fedimintd:8173"
      FM_API_URL: "ws://fedimintd:8174"
      FM_BITCOIN_NETWORK: "${FM_BITCOIN_NETWORK:-regtest}"
      FM_BITCOIND_URL: "http://bitcoind:18443"
      FM_BITCOIND_USERNAME: "${BITCOIN_RPC_USER:-bitcoin}"
      FM_BITCOIND_PASSWORD: "${BITCOIN_RPC_PASS:-bitcoin}"
      FM_DATA_DIR: "/data"
    volumes:
      - fedimint_data:/data
    ports:
      - "${PORT_FM_P2P:-8173}:8173"
      - "${PORT_FM_API:-8174}:8174"
      - "${PORT_FM_UI:-8175}:8175"
    depends_on:
      bitcoind:
        condition: service_healthy
    networks:
      - fedimint-net

  # ─── Fedimint Lightning Gateway ─────────────────────────────
  gatewayd:
    image: ${GATEWAY_IMAGE:-fedimint/gatewayd:releases-v0.10.0}
    container_name: gatewayd
    restart: unless-stopped
    command:
      - gatewayd
      - lnd
    environment:
      FM_GATEWAY_DATA_DIR: "/data"
      FM_GATEWAY_LISTEN_ADDR: "0.0.0.0:8176"
      FM_GATEWAY_API_ADDR: "http://gatewayd:8176"
      FM_GATEWAY_BCRYPT_PASSWORD_HASH: "${GATEWAY_PASSWORD_HASH}"
      FM_GATEWAY_NETWORK: "${FM_BITCOIN_NETWORK:-regtest}"
      FM_BITCOIND_URL: "http://bitcoind:18443"
      FM_BITCOIND_USERNAME: "${BITCOIN_RPC_USER:-bitcoin}"
      FM_BITCOIND_PASSWORD: "${BITCOIN_RPC_PASS:-bitcoin}"
      FM_LND_RPC_ADDR: "https://lnd:10009"
      FM_LND_TLS_CERT: "/lnd/tls.cert"
      FM_LND_MACAROON: "/lnd/data/chain/bitcoin/regtest/admin.macaroon"
    volumes:
      - gateway_data:/data
      - lnd_data:/lnd:ro
    ports:
      - "${PORT_GATEWAY:-8176}:8176"
    depends_on:
      - lnd
      - fedimintd
    networks:
      - fedimint-net

  # ─── RTL (Ride The Lightning) ───────────────────────────────
  rtl:
    image: ${RTL_IMAGE:-shahanafarooqui/rtl:v0.15.8}
    container_name: rtl
    restart: unless-stopped
    environment:
      RTL_CONFIG_PATH: /data
      LN_IMPLEMENTATION: LND
      LN_SERVER_URL: https://lnd:8080
      MACAROON_PATH: /lnd/data/chain/bitcoin/regtest
      CONFIG_PATH: /lnd
      RTL_PASS: ${RTL_PASSWORD:-password}
    volumes:
      - rtl_data:/data
      - lnd_data:/lnd:ro
    ports:
      - "${PORT_RTL:-3000}:3000"
    depends_on:
      - lnd
    networks:
      - fedimint-net

  # ─── Unified Dashboard ──────────────────────────────────────
  dashboard:
    image: nginx:alpine
    container_name: dashboard
    restart: unless-stopped
    volumes:
      - ./ui/public:/usr/share/nginx/html:ro
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${PORT_DASHBOARD:-3001}:80"
    depends_on:
      - bitcoind
      - lnd
      - fedimintd
      - gatewayd
      - rtl
    networks:
      - fedimint-net

volumes:
  bitcoin_data:
  lnd_data:
  fedimint_data:
  gateway_data:
  rtl_data:

networks:
  fedimint-net:
    driver: bridge
